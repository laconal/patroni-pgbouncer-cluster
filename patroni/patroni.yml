scope: postgres-cluster
namespace: /db/
name: ${NODE_NAME}

restapi:
  listen: 0.0.0.0:8008
  connect_address: ${NODE_IP}:8008

etcd3:
  log-level: error
  hosts:
    - patroni1:2379
    - patroni2:2379
    - patroni3:2379

bootstrap:
  dcs:
    ttl: 15
    loop_wait: 5
    retry_timeout: 10
    maximum_lag_on_failover: 33554432

    # Async replication. The primary does not wait for a replica to confirm WAL receipt before acknowledging a commit. Faster, but you can lose committed transactions if the primary crashes before a replica catches up.
    synchronous_mode: true
    synchronous_mode_strict: true # primary refuses writes if NO sync standby available
    synchronous_node_count: 2 # amount of synchronous nodes
    postgresql:
      # after a failover, the old primary may have diverged WAL. pg_rewind lets Patroni "rewind" it back to a common point and re-attach it as a replica without a full base backup. Requires wal_log_hints: on
      use_pg_rewind: true

      # each replica gets a replication slot on the primary. The primary retains WAL segments until the replica has consumed them. This prevents a replica from falling behind and missing WAL — but also means a dead replica's slot will cause the primary to accumulate WAL indefinitely until the slot is dropped. Dangerous if a replica goes away for a long time.
      use_slots: true
      parameters:
        wal_level: replica
        hot_standby: "on"
        wal_keep_size: 512
        max_wal_senders: 10
        max_replication_slots: 10
        wal_log_hints: "on"
        archive_mode: "off"
        shared_preload_libraries: "pg_stat_statements"
        max_connections: 200
        shared_buffers: 256MB
        effective_cache_size: 768MB
        work_mem: 4MB
        maintenance_work_mem: 64MB
        checkpoint_completion_target: "0.9"
        min_wal_size: 512MB
        max_wal_size: 2GB

        # Queries slower than 1 second are logged. Combined with connection and lock-wait logging, this gives you a full observability picture. One subtlety: with pgBouncer in transaction-mode, you'll see many short-lived backend connections in the PostgreSQL log
        # (pgBouncer opens/closes server connections dynamically), which can make log_connections/log_disconnections quite noisy.
        log_min_duration_statement: 1000
        log_checkpoints: "on"
        log_connections: "on"
        log_disconnections: "on"
        log_lock_waits: "on"
        password_encryption: scram-sha-256
  initdb:
    - encoding: UTF8
    - data-checksums
  pg_hba:
    - host replication replicator 0.0.0.0/0 scram-sha-256
    - host all all 0.0.0.0/0 scram-sha-256
  users:
    admin:
      password: admin_password
      options:
        - createrole
        - createdb
    # pgbouncer_auth: used by PgBouncer to look up scram verifiers via auth_query.
    # Must be able to read pg_shadow — granted via pg_shadow membership below.
    # Note: options here are passed as CREATE ROLE ... options; pg_shadow access
    # is granted via post-init SQL in the entrypoint.
    pgbouncer_auth:
      password: pgbouncer_auth_password

postgresql:
  listen: 0.0.0.0:5432
  connect_address: ${NODE_IP}:5432
  data_dir: /data/patroni
  bin_dir: /usr/lib/postgresql/18/bin
  pgpass: /tmp/pgpass
  authentication:
    replication:
      username: replicator
      password: rep_password
    superuser:
      username: postgres
      password: postgres_password
    rewind:
      username: rewind_user
      password: rewind_password
  parameters:
    unix_socket_directories: "/var/run/postgresql"
  # post_init runs once on the node that bootstraps the cluster (the first leader).
  # Grants pg_shadow read access to pgbouncer_auth so auth_query works.
  post_init: /etc/patroni_post_init.sh

watchdog:
  mode: off

tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false
