[databases]
# PgBouncer connects to the LOCAL PostgreSQL on this same node (localhost:5432).
# HAProxy has already routed the client to the correct node (primary or replica),
# so PgBouncer simply pools connections to local PG — no cross-node routing needed.
postgres    = host=127.0.0.1 port=5432 dbname=postgres
*           = host=127.0.0.1 port=5432 dbname=postgres

# Read-only alias — same local PG, useful if app drivers distinguish by db name
postgres_ro = host=127.0.0.1 port=5432 dbname=postgres

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

pool_mode = transaction

max_client_conn = 1000
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

query_wait_timeout = 30
server_idle_timeout = 300
server_lifetime = 3600
client_idle_timeout = 600

server_check_query = SELECT 1
server_check_delay = 3
server_reset_query = DISCARD ALL

auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

admin_users = pgbouncer_admin
stats_users = pgbouncer_admin
stats_period = 60

pidfile = /var/run/pgbouncer/pgbouncer.pid
logfile = /var/log/pgbouncer/pgbouncer.log
