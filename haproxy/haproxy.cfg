global
    maxconn 1000
    log stdout format raw local0
    spread-checks 3
    tune.ssl.default-dh-param 2048

defaults
    log     global
    mode    tcp
    retries 3
    option  tcplog
    option  dontlognull
    option  redispatch
    timeout connect      5s
    timeout client       1h
    timeout server       1h
    timeout check        5s
    timeout queue        30s

# ── Stats page ────────────────────────────────────────────────────────────────
listen stats
    mode  http
    bind  *:7000
    stats enable
    stats uri /
    stats refresh 1s
    stats show-legends
    stats show-node
    stats admin if TRUE

listen primary
    bind *:5000
    option httpchk GET /primary
    http-check expect status 200

    default-server inter 3s fall 2 rise 2 on-marked-down shutdown-sessions
    # inter 2s      → check every 2s normally
    # fastinter 1s  → check every 1s when a backend is failing/recovering
    # fall 2        → mark down after 2 failures  (~2s to detect dead primary)
    # rise 2        → mark up after 2 successes   (~2s to accept new leader)
    # slowstart     → REMOVED: was delaying traffic to new leader for 30s

    server patroni1 patroni1:6432 maxconn 300 check port 8008
    server patroni2 patroni2:6432 maxconn 300 check port 8008
    server patroni3 patroni3:6432 maxconn 300 check port 8008

listen replicas
    bind *:5001
    balance leastconn
    option httpchk GET /replica
    http-check expect status 200
    option allbackups

    default-server inter 3s fall 2 rise 3 on-marked-down shutdown-sessions slowstart 10s
    # rise 3 is fine here — replica availability is less time-critical
    # slowstart 10s is acceptable for replicas (gradual connection ramp-up)
    
    server patroni1 patroni1:6432 maxconn 300 check port 8008
    server patroni2 patroni2:6432 maxconn 300 check port 8008
    server patroni3 patroni3:6432 maxconn 300 check port 8008
