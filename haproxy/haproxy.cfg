global
    maxconn 1000
    log stdout format raw local0
    spread-checks 3
    tune.ssl.default-dh-param 2048

defaults
    log     global
    mode    tcp
    retries 3
    option  tcplog
    option  dontlognull
    option  redispatch
    timeout connect      5s
    timeout client       1h
    timeout server       1h
    timeout check        5s
    timeout queue        30s

# ── Stats page ────────────────────────────────────────────────────────────────
listen stats
    mode  http
    bind  *:7000
    stats enable
    stats uri /
    stats refresh 5s
    stats show-legends
    stats show-node
    stats admin if TRUE

# ── Primary (read/write) — port 5000 ─────────────────────────────────────────
# HAProxy checks Patroni REST (:8008) — GET /primary returns 200 ONLY on leader.
# Traffic is forwarded to PgBouncer (:6432) on the same node.
# Only ONE server will ever be UP at a time — no load balancing needed.
listen primary
    bind *:5000
    option httpchk GET /primary
    http-check expect status 200
    # inter=3s  → check every 3 s
    # fall=2    → mark DOWN after 2 consecutive failures (~6 s)
    # rise=3    → mark UP only after 3 successes (prevents flapping)
    # on-marked-down shutdown-sessions → kill connections to old primary immediately
    default-server inter 3s fall 2 rise 3 on-marked-down shutdown-sessions slowstart 30s
    server patroni1 patroni1:6432 maxconn 300 check port 8008
    server patroni2 patroni2:6432 maxconn 300 check port 8008
    server patroni3 patroni3:6432 maxconn 300 check port 8008

# ── Replicas (read-only) — port 5001 ─────────────────────────────────────────
# HAProxy checks Patroni REST (:8008) — GET /replica returns 200 ONLY on standbys.
# Traffic is forwarded to PgBouncer (:6432) on each healthy replica.
# If ALL replicas are down, falls back to the primary for reads.
listen replicas
    bind *:5001
    balance leastconn
    option httpchk GET /replica
    http-check expect status 200
    option allbackups
    default-server inter 3s fall 2 rise 3 on-marked-down shutdown-sessions slowstart 30s
    server patroni1 patroni1:6432 maxconn 300 check port 8008
    server patroni2 patroni2:6432 maxconn 300 check port 8008
    server patroni3 patroni3:6432 maxconn 300 check port 8008
